<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEW - YEEZY.COM BONUS TRACKS</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:white;
    color:black;
}

.top-left{
    position:fixed;
    top:24px;
    left:24px;
    font-size:30px;
    z-index:100;
}

.center-title{
    position:fixed;
    top:28px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
    letter-spacing:2px;
    z-index:100;
}

.top-right{
    position:fixed;
    top:24px;
    right:24px;
    z-index:100;
}

.bag{
    width:22px;
    height:26px;
    border:2px solid black;
    position:relative;
}

.bag:before{
    content:"";
    position:absolute;
    width:10px;
    height:6px;
    border:2px solid black;
    border-bottom:none;
    border-radius:8px 8px 0 0;
    left:50%;
    transform:translateX(-50%);
    top:-8px;
}

.home{
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding-top:100px;
}

.album-link{
    width:220px;
    cursor:pointer;
}

.album-link img{
    width:100%;
    display:block;
}

.album-name{
    text-align:center;
    margin-top:10px;
    font-size:12px;
    letter-spacing:1px;
}

.album-page{
    display:none;
    padding:100px 20px 80px;
}

.cover{
    width:100%;
    max-width:650px;
    display:block;
    margin:auto;
}

.plus-button{
    text-align:center;
    margin:20px 0 40px;
}

.plus-button a{
    text-decoration:none;
    color:black;
    font-size:34px;
}

.tracklist{
    max-width:650px;
    margin:auto;
}

.track{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 0;
    border-bottom:1px solid #eee;
}

.track button{
    border:none;
    background:none;
    cursor:pointer;
    letter-spacing:2px;
}

.now-playing{
    text-align:center;
    margin-top:25px;
    min-height:20px;
    font-size:12px;
    letter-spacing:1px;
}

</style>
</head>

<body>

<div class="top-left">+</div>

<div class="center-title">NEW</div>

<div class="top-right">
    <div class="bag"></div>
</div>

<section class="home" id="home">

    <div class="album-link" onclick="openAlbum()">
        <img src="IMG_4036.jpeg" alt="BULLY-BONUS">
        <div class="album-name">BULLY-BONUS</div>
    </div>

</section>

<section class="album-page" id="albumPage">

    <img
        src="IMG_4036.jpeg"
        alt="BULLY-BONUS"
        class="cover"
    >

    <div class="plus-button">
        <a href="checkout.html">+</a>
    </div>

    <div class="tracklist">

        <div class="track">
            <span>01 — 40 NIGHTS</span>
            <button onclick="playSong('40 NIGHTS.mp3','40 NIGHTS')">
                LISTEN
            </button>
        </div>

        <div class="track">
            <span>02 — OUTSIDE</span>
            <button onclick="playSong('OUTSIDE.m4a','OUTSIDE')">
                LISTEN
            </button>
        </div>

        <div class="track">
            <span>03 — Y&J</span>
            <button onclick="playSong('Y&J.wav','Y&J')">
                LISTEN
            </button>
        </div>

        <div class="track">
            <span>04 — BULLETPROOF</span>
            <button onclick="playSong('bulletproof.mp3','BULLETPROOF')">
                LISTEN
            </button>
        </div>

        <div class="track">
            <span>05 — QUIET</span>
            <button onclick="playSong('QUIET.m4a','QUIET')">
                LISTEN
            </button>
        </div>

    </div>

    <div class="now-playing" id="nowPlaying"></div>

</section>

<audio id="cassette" src="cassette.mp3"></audio>
<audio id="player"></audio>

<script>

function openAlbum(){

    document.getElementById("home").style.display="none";
    document.getElementById("albumPage").style.display="block";

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });
}

const cassette =
document.getElementById("cassette");

const player =
document.getElementById("player");

const nowPlaying =
document.getElementById("nowPlaying");

function playSong(song,title){

    player.pause();
    player.currentTime = 0;

    cassette.pause();
    cassette.currentTime = 0;

    nowPlaying.innerText =
    "LOADING " + title;

    cassette.play();

    cassette.onended = () => {

        player.src = song;
        player.play();

        nowPlaying.innerText =
        "NOW PLAYING — " + title;
    };
}

</script>

</body>
</html>
